<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極簡 3D 桌球 4.3.0 (明亮直式版)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            /* 將背景改為明亮色系，避免網頁載入瞬間閃黑 */
            background-color: #87CEEB; 
            touch-action: none;
            font-family: sans-serif;
        }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0; /* 增加手機端上下的安全距離 */
            box-sizing: border-box;
            z-index: 999;
        }
        .score-board {
            /* 針對手機版面稍微縮小字體 */
            font-size: 42px; 
            font-weight: bold;
            display: flex;
            width: 100%;
            max-width: 400px; /* 限制計分板最大寬度 */
            justify-content: space-around;
            /* 陰影改深，在亮色背景下才看得清楚 */
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        #score-p2 { color: #2244cc; }
        #score-p1 { color: #cc2222; }
      
        #message {
            font-size: 24px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 20px 35px;
            border-radius: 15px;
            text-align: center;
            line-height: 1.6;
            display: none;
            border: 2px solid #ddd;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui-layer">
        <div class="score-board">
            <span id="score-p2">0</span>
            <span id="score-p1">0</span>
        </div>
        <div id="message"></div>
    </div>

<script>
    // ==================== 基本設定 ====================
    const scene = new THREE.Scene();
    // 畫面改為明亮的天空藍
    scene.background = new THREE.Color(0x87CEEB); 
    
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    // 相機拉高拉遠，適應直立版面
    camera.position.set(0, 18, 26); 
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 燈光：整體調亮
    scene.add(new THREE.AmbientLight(0xffffff, 1.2)); 
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(6, 20, 8);
    scene.add(dirLight);

    // ==================== 物件 ====================
    const table = new THREE.Mesh(
        new THREE.BoxGeometry(10, 0.5, 16),
        // 球桌改為經典運動藍，並增加一點反光質感
        new THREE.MeshPhongMaterial({ color: 0x1e88e5, shininess: 30 }) 
    );
    scene.add(table);

    const net = new THREE.Mesh(
        new THREE.BoxGeometry(10, 0.9, 0.08),
        new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 })
    );
    net.position.y = 0.7;
    scene.add(net);

    function createRacket(color) {
        const group = new THREE.Group();
        const head = new THREE.Mesh(
            new THREE.CylinderGeometry(1.35, 1.35, 0.18, 32),
            new THREE.MeshPhongMaterial({ color: color, shininess: 50 })
        );
        head.rotation.x = Math.PI / 2;
        group.add(head);

        const handle = new THREE.Mesh(
            new THREE.CylinderGeometry(0.18, 0.22, 1.8, 16),
            new THREE.MeshPhongMaterial({ color: 0x8b4513 })
        );
        handle.position.set(0, -1.4, 0.25);
        handle.rotation.x = Math.PI / 5;
        group.add(handle);
        return group;
    }

    const p1 = createRacket(0xee3333); // 稍微調亮紅色
    p1.position.set(0, 1.3, 7);
    scene.add(p1);

    const p2 = createRacket(0x3333ee); // 稍微調亮藍色
    p2.position.set(0, 1.3, -7);
    p2.rotation.y = Math.PI;
    scene.add(p2);

    const ball = new THREE.Mesh(
        new THREE.SphereGeometry(0.35, 32, 32),
        new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 100 })
    );
    scene.add(ball);

    const effects = [];
    function createBounceEffect(x, z) {
        const ring = new THREE.Mesh(
            new THREE.RingGeometry(0.3, 0.6, 32),
            new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true })
        );
        ring.rotation.x = -Math.PI / 2;
        ring.position.set(x, 0.3, z);
        scene.add(ring);
        effects.push({ mesh: ring, life: 1.0 });
    }

    // ==================== 遊戲變數 ====================
    let gameState = 'serve'; // 狀態：serve, play, wait, gameover
    let server = 1;
    let scoreP1 = 0, scoreP2 = 0;
    let turnOwner = 1;
    let hasBounced = false; 

    const BASE_SPEED = 0.085;
    const GRAVITY = 0.0055;
    const WIN_SCORE = 21; // 新增：獲勝分數

    let ballSpeedX = 0, ballSpeedY = 0, ballSpeedZ = 0;
    let p1LastX = 0, p1VelocityX = 0;
    let hasTouchedNet = false;
    let serveBallPos = new THREE.Vector3();

    // ==================== UI ====================
    function updateScore() {
        document.getElementById('score-p1').innerText = scoreP1;
        document.getElementById('score-p2').innerText = scoreP2;
    }

    function showMessage(html, duration = 1600) {
        const msg = document.getElementById('message');
        msg.innerHTML = html;
        msg.style.display = 'block';
        if (duration < 99999) {
            setTimeout(() => { 
                if(gameState !== 'gameover') msg.style.display = 'none'; 
            }, duration);
        }
    }

    function checkWinCondition() {
        if (scoreP1 >= WIN_SCORE || scoreP2 >= WIN_SCORE) {
            gameState = 'gameover';
            const winnerName = scoreP1 >= WIN_SCORE ? '玩家' : '電腦';
            const winnerColor = scoreP1 >= WIN_SCORE ? '#cc2222' : '#2244cc';
            showMessage(`
                <span style="font-size:32px; color:${winnerColor};">${winnerName} 獲勝！</span><br>
                比數 ${scoreP1} : ${scoreP2}<br>
                <span style="color:#666; font-size:18px; display:inline-block; margin-top:10px;">點擊畫面重新開始</span>
            `, 999999);
            return true;
        }
        return false;
    }

    function resetPoint(winner, reason = "") {
        gameState = 'wait';
        if (winner === 1) scoreP1++;
        else if (winner === 2) scoreP2++;

        updateScore();

        // 檢查是否有人獲勝
        if (winner !== 0 && checkWinCondition()) {
            return; // 若遊戲結束，不再進行後續發球邏輯
        }

        const total = scoreP1 + scoreP2;
        server = (Math.floor(total / 2) % 2 === 0) ? 1 : 2;
        turnOwner = server;

        ballSpeedX = ballSpeedY = ballSpeedZ = 0;
        hasTouchedNet = false;
        hasBounced = false; 
        serveBallPos.set(0, 0, 0);

        let color = winner === 1 ? "#cc2222" : "#2244cc";
        let msgHTML = reason ? `<span style="color:#888;font-size:20px;">${reason}</span><br>` : '';
        if (winner !== 0) {
            msgHTML += `<span style="color:${color};">${winner === 1 ? '玩家' : '電腦'}得分！</span>`;
            showMessage(msgHTML);
        }

        setTimeout(() => {
            if (gameState === 'gameover') return; // 如果這段時間內遊戲已結束則阻斷

            gameState = 'serve';
            if (server === 1) {
                showMessage(`換你發球<br><span style="color:#228b22;font-size:20px;">點擊畫面往下砸</span>`, 999999);
            } else {
                showMessage(`電腦發球<br><span style="color:#ff3366;font-size:20px;">準備接球...</span>`, 999999);
                setTimeout(aiServe, 1400);
            }
        }, winner === 0 ? 0 : 1400);
    }

    function aiServe() {
        if (gameState !== 'serve' || server !== 2) return;
        gameState = 'play';
        document.getElementById('message').style.display = 'none';

        ball.position.set(0, 1.8, -6);
        ballSpeedZ = BASE_SPEED * 1.6;
        ballSpeedX = (Math.random() - 0.5) * 0.04;
        ballSpeedY = -0.16;
    }

    // ==================== 碰撞與物理 ====================
    function checkCollisions() {
        const TABLE_W = 5.2;
        const TABLE_L = 8.2;

        if (ball.position.y <= 0.6 && ballSpeedY < 0 && 
            Math.abs(ball.position.x) < TABLE_W && Math.abs(ball.position.z) < TABLE_L) {
            
            ball.position.y = 0.6;
            ballSpeedY = Math.abs(ballSpeedY) * 0.88;
            if (ballSpeedY < 0.04) ballSpeedY = 0.04;

            createBounceEffect(ball.position.x, ball.position.z);
            turnOwner = ball.position.z > 0 ? 1 : 2;
            hasBounced = true; 

            if (hasTouchedNet && 
                ((turnOwner === 1 && ball.position.z > 0) || (turnOwner === 2 && ball.position.z < 0))) {
                resetPoint(turnOwner === 1 ? 2 : 1, "觸網後己方落地");
                return;
            }
        }

        if (ball.position.y < 0) {
            const winner = (turnOwner === 1) ? 2 : 1;
            const reason = hasBounced ? "漏球" : "出界";
            resetPoint(winner, reason);
            return;
        }

        if (ball.position.distanceTo(p1.position) < 1.7 && ballSpeedZ > 0) {
            const power = 1 + Math.abs(p1VelocityX) * 0.9;
            ballSpeedZ = -BASE_SPEED * 1.85 * power;
            ballSpeedY = 0.14 + Math.random() * 0.06;
            ballSpeedX = (ball.position.x - p1.position.x) * 0.05 + p1VelocityX * 0.5;
            turnOwner = 1;
            hasTouchedNet = false;
            hasBounced = false; 
        }

        if (ball.position.distanceTo(p2.position) < 1.7 && ballSpeedZ < 0) {
            ballSpeedZ = BASE_SPEED * 1.75;
            ballSpeedY = 0.13 + Math.random() * 0.05;
            ballSpeedX = (ball.position.x - p2.position.x) * 0.06;
            turnOwner = 2;
            hasTouchedNet = false;
            hasBounced = false; 
        }
    }

    // ==================== 主循環 ====================
    function animate() {
        requestAnimationFrame(animate);

        for (let i = effects.length - 1; i >= 0; i--) {
            const ef = effects[i];
            ef.life -= 0.045;
            ef.mesh.scale.setScalar(1 + (1 - ef.life) * 3.5);
            ef.mesh.material.opacity = ef.life * 0.9;
            if (ef.life <= 0) {
                scene.remove(ef.mesh);
                effects.splice(i, 1);
            }
        }

        p1VelocityX = p1.position.x - p1LastX;
        p1LastX = p1.position.x;

        if (gameState === 'serve') {
            if (server === 1) {
                if (serveBallPos.length() === 0) {
                    serveBallPos.set(p1.position.x, p1.position.y + 0.6, p1.position.z - 1.2);
                }
                ball.position.copy(serveBallPos);
            } else {
                p2.position.x += (0 - p2.position.x) * 0.05;
                ball.position.set(p2.position.x, p2.position.y + 0.6, p2.position.z + 1.2);
            }
        } 
        else if (gameState === 'play') {
            ball.position.x += ballSpeedX;
            ball.position.y += ballSpeedY;
            ball.position.z += ballSpeedZ;
            ballSpeedY -= GRAVITY;

            if (!hasTouchedNet && Math.abs(ball.position.z) < 0.4 && 
                ball.position.y > 0.5 && ball.position.y < 1.6) {
                hasTouchedNet = true;
                ballSpeedZ *= -0.38;
                ballSpeedX *= 0.65;
                ballSpeedY *= 0.75;
            }

            checkCollisions();

            p2.position.x += (ball.position.x - p2.position.x) * 0.092;
            p2.position.z = -7 + (ball.position.z < -1 ? (ball.position.z + 7) * 0.25 : 0);
            p2.position.x = Math.max(Math.min(p2.position.x, 5.8), -5.8);
        }

        renderer.render(scene, camera);
    }

    // ==================== 控制 ====================
    function onPointerMove(e) {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        // 提高 X 軸靈敏度，方便直立窄螢幕遊玩
        let nx = (clientX / window.innerWidth) * 2 - 1;
        p1.position.x = nx * 10; 
        p1.position.x = Math.max(Math.min(p1.position.x, 8), -8);

        let ny = clientY / window.innerHeight;
        p1.position.z = 2 + ny * 8;
        p1.position.z = Math.max(Math.min(p1.position.z, 7.5), 1.8);
    }

    function onPointerDown() {
        // 如果在遊戲結束狀態點擊，則重新開始
        if (gameState === 'gameover') {
            scoreP1 = 0; 
            scoreP2 = 0;
            document.getElementById('message').style.display = 'none';
            resetPoint(0);
            return;
        }

        if (gameState === 'serve' && server === 1) {
            gameState = 'play';
            document.getElementById('message').style.display = 'none';

            ballSpeedZ = -BASE_SPEED * 1.7;
            ballSpeedX = (Math.random() - 0.5) * 0.03;
            ballSpeedY = -0.14;
            hasTouchedNet = false;
        }
    }

    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('touchmove', onPointerMove, { passive: false });
    window.addEventListener('mousedown', onPointerDown);
    window.addEventListener('touchstart', onPointerDown);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // 開始
    updateScore();
    resetPoint(0);
    animate();
</script>
</body>
</html>
