<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極簡 3D 桌球 5.0 (高質感 PBR 版 + 旋轉)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1e293b; 
            touch-action: none;
            font-family: sans-serif;
        }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0;
            box-sizing: border-box;
            z-index: 999;
        }
        .score-board {
            font-size: 42px; 
            font-weight: bold;
            display: flex;
            width: 100%;
            max-width: 400px;
            justify-content: space-around;
            text-shadow: 0 4px 12px rgba(0,0,0,0.6);
        }
        #score-p2 { color: #60a5fa; }
        #score-p1 { color: #f87171; }
      
        #message {
            font-size: 24px;
            font-weight: bold;
            background: rgba(15, 23, 42, 0.85);
            color: #f1f5f9;
            backdrop-filter: blur(8px);
            padding: 20px 35px;
            border-radius: 15px;
            text-align: center;
            line-height: 1.6;
            display: none;
            border: 1px solid #334155;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui-layer">
        <div class="score-board">
            <span id="score-p2">0</span>
            <span id="score-p1">0</span>
        </div>
        <div id="message"></div>
    </div>

<script>
    // ==================== 基本設定 ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1e293b); 
    
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 18, 26); 
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // ==================== 燈光 ====================
    scene.add(new THREE.AmbientLight(0xffffff, 0.5)); 
    
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(8, 25, 12);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    dirLight.shadow.bias = -0.001;
    scene.add(dirLight);

    const spotLight = new THREE.SpotLight(0xffffff, 0.6);
    spotLight.position.set(0, 20, 0);
    spotLight.angle = Math.PI / 4;
    spotLight.penumbra = 0.5;
    scene.add(spotLight);

    // ==================== 物件 ====================
    const table = new THREE.Mesh(
        new THREE.BoxGeometry(10, 0.5, 16),
        new THREE.MeshStandardMaterial({ 
            color: 0x0284c7,
            roughness: 0.3,
            metalness: 0.1
        }) 
    );
    table.receiveShadow = true;
    scene.add(table);

    const net = new THREE.Mesh(
        new THREE.BoxGeometry(10, 0.9, 0.05),
        new THREE.MeshStandardMaterial({ 
            color: 0xffffff, 
            transparent: true, 
            opacity: 0.5,
            roughness: 0.8
        })
    );
    net.position.y = 0.7;
    net.castShadow = true;
    scene.add(net);

    function createRacket(rubberColor) {
        const group = new THREE.Group();
        const head = new THREE.Mesh(
            new THREE.CylinderGeometry(1.35, 1.35, 0.16, 32),
            new THREE.MeshStandardMaterial({ 
                color: rubberColor,
                roughness: 0.85,
                metalness: 0.0
            })
        );
        head.rotation.x = Math.PI / 2;
        head.castShadow = true;
        group.add(head);

        const woodEdge = new THREE.Mesh(
            new THREE.CylinderGeometry(1.36, 1.36, 0.06, 32),
            new THREE.MeshStandardMaterial({
                color: 0xd4a373,
                roughness: 0.7,
                metalness: 0.1
            })
        );
        woodEdge.rotation.x = Math.PI / 2;
        group.add(woodEdge);

        const handle = new THREE.Mesh(
            new THREE.CylinderGeometry(0.18, 0.23, 1.8, 16),
            new THREE.MeshStandardMaterial({ 
                color: 0x8b4513,
                roughness: 0.6,
                metalness: 0.1
            })
        );
        handle.position.set(0, -1.4, 0.25);
        handle.rotation.x = Math.PI / 5;
        handle.castShadow = true;
        group.add(handle);
        return group;
    }

    const p1 = createRacket(0xef4444); 
    p1.position.set(0, 1.3, 7);
    scene.add(p1);

    const p2 = createRacket(0x3b82f6); 
    p2.position.set(0, 1.3, -7);
    p2.rotation.y = Math.PI;
    scene.add(p2);

    // ==================== 乒乓球（新增旋轉） ====================
    const ball = new THREE.Mesh(
        new THREE.SphereGeometry(0.32, 32, 32),
        new THREE.MeshPhysicalMaterial({ 
            color: 0xffffff,
            roughness: 0.1,
            metalness: 0.0,
            clearcoat: 1.0,
            clearcoatRoughness: 0.1
        })
    );
    ball.castShadow = true;
    ball.userData.spin = new THREE.Vector3(0, 0, 0);   // 新增：旋轉向量
    scene.add(ball);

    const effects = [];
    function createBounceEffect(x, z) {
        const ring = new THREE.Mesh(
            new THREE.RingGeometry(0.3, 0.6, 32),
            new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true })
        );
        ring.rotation.x = -Math.PI / 2;
        ring.position.set(x, 0.3, z);
        scene.add(ring);
        effects.push({ mesh: ring, life: 1.0 });
    }

    // ==================== 遊戲變數 ====================
    let gameState = 'serve'; 
    let server = 1;
    let scoreP1 = 0, scoreP2 = 0;
    let turnOwner = 1;
    let hasBounced = false; 

    const BASE_SPEED = 0.085;
    const GRAVITY = 0.0055;
    const WIN_SCORE = 21; 

    let ballSpeedX = 0, ballSpeedY = 0, ballSpeedZ = 0;
    let p1LastX = 0, p1VelocityX = 0;
    let hasTouchedNet = false;
    let serveBallPos = new THREE.Vector3();

    // ==================== UI ====================
    function updateScore() {
        document.getElementById('score-p1').innerText = scoreP1;
        document.getElementById('score-p2').innerText = scoreP2;
    }

    function showMessage(html, duration = 1600) {
        const msg = document.getElementById('message');
        msg.innerHTML = html;
        msg.style.display = 'block';
        if (duration < 99999) {
            setTimeout(() => { 
                if(gameState !== 'gameover') msg.style.display = 'none'; 
            }, duration);
        }
    }

    function checkWinCondition() {
        if (scoreP1 >= WIN_SCORE || scoreP2 >= WIN_SCORE) {
            gameState = 'gameover';
            const winnerName = scoreP1 >= WIN_SCORE ? '玩家' : '電腦';
            const winnerColor = scoreP1 >= WIN_SCORE ? '#f87171' : '#60a5fa';
            showMessage(`
                <span style="font-size:32px; color:${winnerColor};">${winnerName} 獲勝！</span><br>
                比數 ${scoreP1} : ${scoreP2}<br>
                <span style="color:#94a3b8; font-size:18px; display:inline-block; margin-top:10px;">點擊畫面重新開始</span>
            `, 999999);
            return true;
        }
        return false;
    }

    function resetPoint(winner, reason = "") {
        gameState = 'wait';
        if (winner === 1) scoreP1++;
        else if (winner === 2) scoreP2++;

        updateScore();

        if (winner !== 0 && checkWinCondition()) return;

        const total = scoreP1 + scoreP2;
        server = (Math.floor(total / 2) % 2 === 0) ? 1 : 2;
        turnOwner = server;

        ballSpeedX = ballSpeedY = ballSpeedZ = 0;
        ball.userData.spin.set(0, 0, 0);
        hasTouchedNet = false;
        hasBounced = false; 
        serveBallPos.set(0, 0, 0);

        let color = winner === 1 ? "#f87171" : "#60a5fa";
        let msgHTML = reason ? `<span style="color:#94a3b8;font-size:20px;">${reason}</span><br>` : '';
        if (winner !== 0) {
            msgHTML += `<span style="color:${color};">${winner === 1 ? '玩家' : '電腦'}得分！</span>`;
            showMessage(msgHTML);
        }

        setTimeout(() => {
            if (gameState === 'gameover') return; 
            gameState = 'serve';
            if (server === 1) {
                showMessage(`換你發球<br><span style="color:#4ade80;font-size:20px;">點擊畫面往下砸</span>`, 999999);
            } else {
                showMessage(`電腦發球<br><span style="color:#fb7185;font-size:20px;">準備接球...</span>`, 999999);
                setTimeout(aiServe, 1400);
            }
        }, winner === 0 ? 0 : 1400);
    }

    function aiServe() {
        if (gameState !== 'serve' || server !== 2) return;
        gameState = 'play';
        document.getElementById('message').style.display = 'none';

        ball.position.set(0, 1.8, -6);
        ballSpeedZ = BASE_SPEED * 1.6;
        ballSpeedX = (Math.random() - 0.5) * 0.04;
        ballSpeedY = -0.16;
        
        // AI 發球帶一點上旋
        ball.userData.spin.set(
            (Math.random() - 0.5) * 0.08,
            0,
            -0.12   // 上旋（讓球往前彈）
        );
    }

    // ==================== 碰撞與物理（重點修改） ====================
    function checkCollisions() {
        const TABLE_W = 5.2;
        const TABLE_L = 8.2;

        // 桌面碰撞
        if (ball.position.y <= 0.6 && ballSpeedY < 0 && 
            Math.abs(ball.position.x) < TABLE_W && Math.abs(ball.position.z) < TABLE_L) {
            
            ball.position.y = 0.6;
            const spinFactor = ball.userData.spin.z * 0.8; // 上旋/下旋影響
            ballSpeedY = Math.abs(ballSpeedY) * (0.88 + spinFactor * 0.3);
            if (ballSpeedY < 0.04) ballSpeedY = 0.04;

            // 側旋影響水平方向
            ballSpeedX += ball.userData.spin.x * 0.6;

            createBounceEffect(ball.position.x, ball.position.z);
            turnOwner = ball.position.z > 0 ? 1 : 2;
            hasBounced = true; 

            // 旋轉衰減
            ball.userData.spin.multiplyScalar(0.75);

            if (hasTouchedNet && 
                ((turnOwner === 1 && ball.position.z > 0) || (turnOwner === 2 && ball.position.z < 0))) {
                resetPoint(turnOwner === 1 ? 2 : 1, "觸網後己方落地");
                return;
            }
        }

        if (ball.position.y < 0) {
            const winner = (turnOwner === 1) ? 2 : 1;
            const reason = hasBounced ? "漏球" : "出界";
            resetPoint(winner, reason);
            return;
        }

        // 玩家擊球
        if (ball.position.distanceTo(p1.position) < 2.5 && ballSpeedZ > 0) {
            const power = 1 + Math.abs(p1VelocityX) * 0.9;
            ballSpeedZ = -BASE_SPEED * 1.85 * power;
            ballSpeedY = 0.14 + Math.random() * 0.06;
            ballSpeedX = (ball.position.x - p1.position.x) * 0.05 + p1VelocityX * 0.5;

            // === 新增：根據球拍速度產生旋轉 ===
            ball.userData.spin.set(
                p1VelocityX * 0.25,                    // 側旋
                0,
                -p1VelocityX * 0.18 - 0.08             // 上旋（負值為上旋）
            );

            turnOwner = 1;
            hasTouchedNet = false;
            hasBounced = false; 
        }

        // AI 擊球（簡單旋轉）
        if (ball.position.distanceTo(p2.position) < 2.0 && ballSpeedZ < 0) {
            ballSpeedZ = BASE_SPEED * 1.75;
            ballSpeedY = 0.13 + Math.random() * 0.05;
            ballSpeedX = (ball.position.x - p2.position.x) * 0.06;

            ball.userData.spin.set(
                (Math.random() - 0.5) * 0.12,
                0,
                -0.09   // AI 偏好上旋
            );

            turnOwner = 2;
            hasTouchedNet = false;
            hasBounced = false; 
        }
    }

    // ==================== 主循環 ====================
    function animate() {
        requestAnimationFrame(animate);

        // 特效更新
        for (let i = effects.length - 1; i >= 0; i--) {
            const ef = effects[i];
            ef.life -= 0.045;
            ef.mesh.scale.setScalar(1 + (1 - ef.life) * 3.5);
            ef.mesh.material.opacity = ef.life * 0.9;
            if (ef.life <= 0) {
                scene.remove(ef.mesh);
                effects.splice(i, 1);
            }
        }

        p1VelocityX = p1.position.x - p1LastX;
        p1LastX = p1.position.x;

        if (gameState === 'serve') {
            if (server === 1) {
                if (serveBallPos.length() === 0) {
                    serveBallPos.set(p1.position.x, p1.position.y + 0.6, p1.position.z - 1.2);
                }
                ball.position.copy(serveBallPos);
                ball.userData.spin.set(0,0,0);
            } else {
                p2.position.x += (0 - p2.position.x) * 0.05;
                ball.position.set(p2.position.x, p2.position.y + 0.6, p2.position.z + 1.2);
            }
        } 
        else if (gameState === 'play') {
            ball.position.x += ballSpeedX;
            ball.position.y += ballSpeedY;
            ball.position.z += ballSpeedZ;
            ballSpeedY -= GRAVITY;

            // 旋轉衰減 + 側旋曲線
            ball.userData.spin.multiplyScalar(0.985);
            ballSpeedX += ball.userData.spin.x * 0.012;   // Magnus 效應（簡化版）

            // 視覺旋轉
            ball.rotation.x += ball.userData.spin.z * 1.8;
            ball.rotation.y += ball.userData.spin.x * 1.2;
            ball.rotation.z += ball.userData.spin.y * 0.5;

            if (!hasTouchedNet && Math.abs(ball.position.z) < 0.4 && 
                ball.position.y > 0.5 && ball.position.y < 1.6) {
                hasTouchedNet = true;
                ballSpeedZ *= -0.38;
                ballSpeedX *= 0.65;
                ballSpeedY *= 0.75;
            }

            checkCollisions();

            p2.position.x += (ball.position.x - p2.position.x) * 0.092;
            p2.position.z = -7 + (ball.position.z < -1 ? (ball.position.z + 7) * 0.25 : 0);
            p2.position.x = Math.max(Math.min(p2.position.x, 5.8), -5.8);
        }

        renderer.render(scene, camera);
    }

    // ==================== 控制 ====================
    function onPointerMove(e) {
        if (e.cancelable) e.preventDefault();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;

        let nx = (clientX / window.innerWidth) * 2 - 1;
        p1.position.x = nx * 12; 
        p1.position.x = Math.max(Math.min(p1.position.x, 8), -8);

        let ny = (e.touches ? e.touches[0].clientY : e.clientY) / window.innerHeight;

        // 針對手機觸控與電腦滑鼠設定不同的靈敏度與操作熱區
        if (e.touches) {
            // 手機版：放大倍率 (30)，讓拇指在螢幕下半部微調就能涵蓋整個球桌深度
            p1.position.z = (ny - 0.4) * 30; 
        } else {
            // 電腦版：維持你原本順手的手感 (18)
            p1.position.z = (ny - 0.3) * 18; 
        }
        p1.position.z = Math.max(Math.min(p1.position.z, 10), 0.5); 
    }

    function onPointerDown(e) {
        if (gameState === 'gameover') {
            scoreP1 = 0; 
            scoreP2 = 0;
            document.getElementById('message').style.display = 'none';
            resetPoint(0);
            return;
        }

        if (gameState === 'serve' && server === 1) {
            gameState = 'play';
            document.getElementById('message').style.display = 'none';

            ballSpeedZ = -BASE_SPEED * 1.7;
            ballSpeedX = (Math.random() - 0.5) * 0.03;
            ballSpeedY = -0.14;

            // 玩家發球預設一點下旋
            ball.userData.spin.set(0, 0, 0.06);
        }
    }

    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('touchmove', onPointerMove, { passive: false });
    window.addEventListener('mousedown', onPointerDown);
    window.addEventListener('touchstart', onPointerDown);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // 開始遊戲
    updateScore();
    resetPoint(0);
    animate();
</script>
</body>
</html>
